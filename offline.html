<!DOCTYPE html>
<html lang="es-VE">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexion — Dr. Jackson Briones</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0d1b2a;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .offline {
      max-width: 400px;
    }
    .offline-icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
    }
    p {
      color: #6b7280;
      font-size: 0.875rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    a {
      display: inline-block;
      background: #10b981;
      color: #ffffff;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.875rem;
      transition: background 0.2s ease;
    }
    a:hover { background: #059669; }
  </style>
</head>
<body>
  <div class="offline">
    <div class="offline-icon">📡</div>
    <h1>Sin conexion</h1>
    <p>No hay conexion a internet en este momento. Verifica tu conexion e intenta nuevamente.</p>
    <a href="/">Reintentar</a>
  </div>
</body>
</html>
